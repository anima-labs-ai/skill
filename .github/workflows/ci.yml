name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Test
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned, not `latest`: resolving a floating tag makes the job
          # depend on api.github.com, so an API 503 fast-fails it before it
          # runs. Caching is no protection either way — the cache key is the
          # resolved version, so the API call happens first regardless.
          # (`cache: true` was removed here: not a setup-bun@v2 input, so it
          # was silently ignored; v2 caches by default, disable via no-cache.)
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Test
        run: bun test
